# Supabase project configuration (used by `supabase` CLI for local dev / link).
project_id = "buy-sell-tool"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]

[auth.external.azure]
enabled = true
# Set these via `supabase secrets set` or in the dashboard:
# client_id     = "env(ENTRA_CLIENT_ID)"
# client_secret = "env(ENTRA_CLIENT_SECRET)"
# url           = "https://login.microsoftonline.com/<ENTRA_TENANT_ID>/v2.0"
skip_nonce_check = false
